metrics:
  - id: gmv
    name: GMV
    aliases: ["成交额", "销售额", "流水", "营业额"]
    definition: "支付成功订单金额总和，不含退款冲减。"
    business_meaning: "用于衡量平台最核心的交易规模，是运营早晚都要先看的总盘指标。"
    calculation: "SUM(pay_amount) WHERE order_status IN ('PAID', 'COMPLETED')"
    default_time_field: "paid_at"
    default_filters:
      - "exclude canceled orders"
      - "exclude refunded amount"
    allowed_dimensions: ["region", "city", "category_l1", "channel", "merchant"]
    common_confusion:
      - "是否包含退款：默认不含退款，退款看退款指标。"
      - "按下单还是按支付：默认按支付时间统计。"

  - id: paid_order_count
    name: 支付订单数
    aliases: ["支付单量", "订单量", "支付笔数"]
    definition: "在统计周期内支付成功的订单数。"
    business_meaning: "用于判断 GMV 变化是由单量变化还是客单价变化导致。"
    calculation: "COUNT(DISTINCT order_id) WHERE order_status IN ('PAID', 'COMPLETED')"
    default_time_field: "paid_at"
    default_filters:
      - "exclude canceled orders"
    allowed_dimensions: ["region", "city", "category_l1", "channel", "merchant"]

  - id: active_buyer
    name: 活跃买家数
    aliases: ["活跃买家", "支付买家数", "买家数"]
    definition: "统计周期内发生过支付行为的去重买家数。"
    business_meaning: "用于判断成交变化是由用户规模变化还是单用户购买力变化导致。"
    calculation: "COUNT(DISTINCT buyer_id) WHERE order_status IN ('PAID', 'COMPLETED')"
    default_time_field: "paid_at"
    default_filters:
      - "exclude canceled orders"
    allowed_dimensions: ["region", "city", "channel", "user_tier"]

  - id: dau
    name: DAU
    aliases: ["日活", "活跃用户", "活跃人数"]
    definition: "当天发生过登录、浏览、点击或交易行为的去重用户数。"
    business_meaning: "用于判断平台基础活跃盘子是否健康，是很多转化分析的起点。"
    calculation: "COUNT(DISTINCT user_id) FROM dwd_user_events WHERE event_date = stat_date"
    default_time_field: "event_time"
    default_filters:
      - "event_type in view/click/cart/order_submit/pay"
    allowed_dimensions: ["region", "city", "channel", "device_type"]
    disambiguation_required: true
    disambiguation_question: "您说的活跃用户，是指 DAU（日活）还是 MAU（月活）？"

  - id: conversion_rate
    name: 支付转化率
    aliases: ["转化率", "下单转化率", "支付转化"]
    definition: "支付买家数 / 浏览用户数。"
    business_meaning: "用于判断流量进来之后能不能成交，是归因分析里最关键的过程指标之一。"
    calculation: "paid_users / view_users"
    default_time_field: "event_time"
    default_filters:
      - "same date window for numerator and denominator"
    allowed_dimensions: ["region", "category_l1", "channel", "campaign"]
    common_confusion:
      - "浏览转支付还是下单转支付：默认看浏览到支付。"

  - id: refund_rate
    name: 退款率
    aliases: ["退货率", "售后率", "退款占比"]
    definition: "退款订单数 / 支付订单数。"
    business_meaning: "用于衡量成交质量，很多 GMV 波动表面看是增长问题，实质可能是退款恶化。"
    calculation: "COUNT(DISTINCT refund_order_id) / COUNT(DISTINCT paid_order_id)"
    default_time_field: "refund_created_at"
    default_filters:
      - "only successful refund requests"
    allowed_dimensions: ["region", "category_l1", "merchant", "refund_reason"]

  - id: roi
    name: ROI
    aliases: ["投产比", "活动 ROI", "渠道 ROI"]
    definition: "活动或渠道带来的成交金额 / 投入成本。"
    business_meaning: "用于评估活动和投放值不值得继续，是管理层和运营复盘最关心的效率指标。"
    calculation: "incremental_gmv / spend_amount"
    default_time_field: "stat_date"
    default_filters:
      - "cost and revenue within same campaign window"
    allowed_dimensions: ["channel", "campaign", "category_l1"]
