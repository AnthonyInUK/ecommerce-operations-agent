# ============================================================================
# Assistant Agent - Full Example Configuration
# ============================================================================
# This configuration demonstrates all available options with customizations.
# ============================================================================

spring:
  application:
    name: assistant-agent-full

server:
  port: 8080

# 可观测性：暴露健康检查、指标和 Prometheus 抓取端点。
# LLM 韧性层指标(llm_resilience_*)和 SQL 审计指标(sql_audit_recent_count)会出现在 /actuator/prometheus。
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

assistant.agent.start:
  demo-experiences:
    enabled: false
  ecommerce-experiences:
    enabled: true

app:
  datasource:
    enabled: true
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:assistant_agent;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    username: sa
    password:
    bootstrap-demo-data: true
    bootstrap-olist-raw-schema: false
    olist-raw-import-dir:
    bootstrap-olist-analytics: false
    prefer-olist-analytics: false
    read-cache-enabled: true
    read-cache-ttl-seconds: 120
    read-cache-max-entries: 512
    read-cache-cache-empty-results: false
  operations:
    daily-report:
      enabled: false
      cron: "0 0 8 * * *"
      source-id: ecommerce-ops
      created-by: system
    gmv-drop-watch:
      enabled: false
      cron: "0 15 8 * * *"
      source-id: ecommerce-ops
      created-by: system
      relative-drop-threshold: 0.15
      week-over-week-drop-threshold: 0.15
      rolling-average-window-days: 7
      rolling-average-drop-threshold: 0.12
      year-over-year-drop-threshold: 0.15
      special-period-threshold-multiplier: 1.5
      demo-report-date:
      holiday-dates: []
      activity-windows: []
  reply:
    feishu-webhook:
    notification-dedup-enabled: true
    notification-dedup-window-seconds: 1800
    persistent-notification-dedup-enabled: true
    notification-fallback-to-ide-log-enabled: true
    feishu-webhook-timeout-seconds: 8

# ============================================================================
# PGVector - Persistent vector store for experience semantic search
# ============================================================================
# Default: SimpleVectorStore (in-memory, resets on restart) — zero config needed.
# Production: uncomment the block below and set the three env vars.
#   PGVECTOR_HOST / PGVECTOR_DB / PGVECTOR_PASSWORD
#
# Prerequisites (run once):
#   CREATE EXTENSION IF NOT EXISTS vector;
#   -- Spring AI auto-creates the vector_store table on first start.
#
# spring:
#   datasource:
#     url: jdbc:postgresql://${PGVECTOR_HOST:localhost}:5432/${PGVECTOR_DB:assistant_agent}
#     username: postgres
#     password: ${PGVECTOR_PASSWORD}
#     driver-class-name: org.postgresql.Driver
#   ai:
#     vectorstore:
#       pgvector:
#         dimensions: 1536          # match your embedding model output dimension
#         distance-type: COSINE_DISTANCE
#         index-type: HNSW

# ============================================================================
# DashScope Configuration
# ============================================================================
spring.ai.dashscope:
  api-key: ${DASHSCOPE_API_KEY}
  chat:
    options:
      model: qwen-max

# ============================================================================
# Experience Module - with FastIntent enabled
# ============================================================================
spring.ai.alibaba.codeact.extension.experience:
  enabled: true
  fast-intent-enabled: true
  fast-intent-react-enabled: true
  fast-intent-code-enabled: true
  fast-intent-allowed-tools:
    - send_success_message
    - send_error_message
    - send_notification
    - write_code
    - write_condition_code
    - GmvQueryTool
    - RegionPerformanceQueryTool
    - CategoryRankTool
    - RefundAnalysisTool
    - FunnelAnalysisTool
  logging:
    enabled: true

experience:
  console:
    enabled: true

# ============================================================================
# Learning Module - with after-agent learning
# ============================================================================
spring.ai.alibaba.codeact.extension.learning:
  enabled: true
  online:
    enabled: true
    after-agent:
      enabled: true
      learning-types:
        - experience

# ============================================================================
# Reply Module - with custom tools
# ============================================================================
spring.ai.alibaba.codeact.extension.reply:
  enabled: true
  tools:
    - toolName: send_success_message
      channelCode: IDE_TEXT
      description: 向 IDE 控制台发送成功消息
      reactEnabled: true
      codeActEnabled: true
      parameters:
        - name: text
          type: STRING
          required: true
          description: 成功消息的文本
    - toolName: send_error_message
      channelCode: IDE_TEXT
      description: 向 IDE 控制台发送错误消息
      reactEnabled: true
      codeActEnabled: true
      parameters:
        - name: text
          type: STRING
          required: true
          description: 错误消息的文本
    - toolName: send_notification
      channelCode: IDE_TEXT
      description: 发送通知消息
      reactEnabled: true
      codeActEnabled: true
      parameters:
        - name: text
          type: STRING
          required: true
          description: 通知的文本

# ============================================================================
# Evaluation Module - with input routing
# ============================================================================
spring.ai.alibaba.codeact.extension.evaluation:
  enabled: true
  input-routing:
    enabled: true
    suite-id: default-suite

# ============================================================================
# Prompt Contributor Module - 启用基于评估的 Prompt 贡献
# ============================================================================
spring.ai.alibaba.codeact.extension.prompt:
  enabled: true
  react:
    enabled: true

spring.ai.alibaba.codeact.extension.trigger:
  enabled: true
  execution:
    execution-timeout: 30000
    default-max-retries: 1
    default-retry-delay: 1000

# ============================================================================
# Logging - Debug level for development
# ============================================================================
logging:
  level:
    com.alibaba.assistant.agent: DEBUG
