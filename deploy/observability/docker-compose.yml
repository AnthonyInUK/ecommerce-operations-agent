# 一键起 Prometheus + Grafana，抓取并可视化 Assistant Agent 的韧性层与 SQL 审计指标。
#
# 用法：
#   1. 先启动应用（默认 8080 端口）：cd assistant-agent-start && mvn spring-boot:run
#   2. 在本目录执行：docker compose up -d
#   3. 打开 Grafana: http://localhost:3000 （匿名免登录，已预置 "Assistant Agent 可观测" 仪表盘）
#   4. 在 Agent 控制台发几个分析请求，刷新仪表盘即可看到曲线
services:
  prometheus:
    image: prom/prometheus:latest
    container_name: aa-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      # Linux 下让容器能解析 host.docker.internal（Mac/Windows 自带）
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: aa-grafana
    ports:
      - "3000:3000"
    environment:
      # 本地演示用：匿名免登录、直接管理员权限，方便截图
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
