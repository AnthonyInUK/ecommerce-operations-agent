services:
  assistant-agent:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: assistant-agent-ecommerce:local
    ports:
      - "${SERVER_PORT:-18080}:18080"
    environment:
      SERVER_PORT: 18080
      MODEL_PROVIDER: ${MODEL_PROVIDER:-dashscope}
      SPRING_AI_MODEL_CHAT: ${SPRING_AI_MODEL_CHAT:-${MODEL_PROVIDER:-dashscope}}
      MODEL_NAME: ${MODEL_NAME:-qwen-max}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      DASHSCOPE_MODEL: ${DASHSCOPE_MODEL:-${MODEL_NAME:-qwen-max}}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      APP_LOG_FILE: /app/logs/assistant-agent.log
      APP_DATASOURCE_URL: ${APP_DATASOURCE_URL:-jdbc:h2:file:/app/data/ecommerce-agent;MODE=MySQL;AUTO_SERVER=TRUE;DATABASE_TO_UPPER=false}
      APP_DATASOURCE_USERNAME: ${APP_DATASOURCE_USERNAME:-sa}
      APP_DATASOURCE_PASSWORD: ${APP_DATASOURCE_PASSWORD:-}
      APP_BOOTSTRAP_DEMO_DATA: ${APP_BOOTSTRAP_DEMO_DATA:-true}
      APP_BOOTSTRAP_OLIST_RAW_SCHEMA: ${APP_BOOTSTRAP_OLIST_RAW_SCHEMA:-true}
      APP_OLIST_RAW_IMPORT_DIR: ${APP_OLIST_RAW_IMPORT_DIR:-/app/olist-csv}
      APP_BOOTSTRAP_OLIST_ANALYTICS: ${APP_BOOTSTRAP_OLIST_ANALYTICS:-true}
      APP_PREFER_OLIST_ANALYTICS: ${APP_PREFER_OLIST_ANALYTICS:-true}
      APP_OPERATIONS_GMV_DROP_WATCH_ENABLED: ${APP_OPERATIONS_GMV_DROP_WATCH_ENABLED:-true}
      APP_OPERATIONS_GMV_DROP_WATCH_DEMO_REPORT_DATE: ${APP_OPERATIONS_GMV_DROP_WATCH_DEMO_REPORT_DATE:-2018-08-29}
      APP_OPERATIONS_GMV_DROP_WATCH_THRESHOLD: ${APP_OPERATIONS_GMV_DROP_WATCH_THRESHOLD:-0.15}
      APP_OPERATIONS_GMV_DROP_WATCH_WOW_THRESHOLD: ${APP_OPERATIONS_GMV_DROP_WATCH_WOW_THRESHOLD:-0.15}
      APP_OPERATIONS_GMV_DROP_WATCH_ROLLING_WINDOW_DAYS: ${APP_OPERATIONS_GMV_DROP_WATCH_ROLLING_WINDOW_DAYS:-7}
      APP_OPERATIONS_GMV_DROP_WATCH_ROLLING_THRESHOLD: ${APP_OPERATIONS_GMV_DROP_WATCH_ROLLING_THRESHOLD:-0.12}
      APP_OPERATIONS_GMV_DROP_WATCH_YOY_THRESHOLD: ${APP_OPERATIONS_GMV_DROP_WATCH_YOY_THRESHOLD:-0.15}
      APP_OPERATIONS_DAILY_REPORT_ENABLED: ${APP_OPERATIONS_DAILY_REPORT_ENABLED:-false}
      READ_CACHE_ENABLED: ${READ_CACHE_ENABLED:-true}
      READ_CACHE_TTL_SECONDS: ${READ_CACHE_TTL_SECONDS:-120}
      TRIGGER_TIMEOUT_MS: ${TRIGGER_TIMEOUT_MS:-300000}
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL:-}
      FEISHU_NOTIFICATION_DEDUP_ENABLED: ${FEISHU_NOTIFICATION_DEDUP_ENABLED:-true}
      PERSISTENT_NOTIFICATION_DEDUP_ENABLED: ${PERSISTENT_NOTIFICATION_DEDUP_ENABLED:-true}
      NOTIFICATION_FALLBACK_TO_IDE_LOG_ENABLED: ${NOTIFICATION_FALLBACK_TO_IDE_LOG_ENABLED:-true}
    volumes:
      - ../logs:/app/logs
      - ../data:/app/data
      - ../data/olist-csv:/app/olist-csv:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:18080/actuator/health | grep '\"status\":\"UP\"' >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
